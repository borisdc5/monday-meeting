<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AllBoard - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; overflow-x: hidden; }
    
    .sidebar { width: 80px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-right: 1px solid #334155; display: flex; flex-direction: column; align-items: center; padding: 20px 0; position: fixed; height: 100vh; left: 0; top: 0; z-index: 100; }
    .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; margin-bottom: 30px; cursor: pointer; }
    .nav-item { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; color: #94a3b8; font-size: 24px; margin-bottom: 16px; position: relative; }
    .nav-item:hover { background: rgba(124, 58, 237, 0.1); color: #7c3aed; }
    .nav-item.active { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: white; }
    .nav-item.active::before { content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 4px; height: 24px; background: #7c3aed; border-radius: 2px; }
    .nav-label { position: absolute; left: 100%; top: 50%; transform: translateY(-50%); margin-left: 12px; background: rgba(15, 23, 42, 0.95); padding: 4px 8px; border-radius: 6px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .nav-item:hover .nav-label { opacity: 1; }

    .main { margin-left: 80px; padding: 32px; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .header-title { font-size: 28px; font-weight: 700; color: #e2e8f0; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: linear-gradient(135deg, rgba(124, 58, 237, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%); border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 16px; padding: 24px; }
    .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
    .card-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 16px; padding: 24px; }
    .card-title { font-size: 14px; font-weight: 700; color: #e2e8f0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; }

    .ranking-item { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }
    .ranking-item:last-child { border-bottom: none; }
    .rank-badge { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .rank-badge.rank1 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .rank-badge.rank2 { background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%); }
    .rank-badge.rank3 { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
    .rank-badge.other { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
    .rank-info { flex: 1; }
    .rank-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }
    .rank-stat { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .rank-value { font-size: 16px; font-weight: 700; color: #7c3aed; }

    .production-table { width: 100%; }
    .prod-row { display: grid; grid-template-columns: 120px 1fr 120px 100px; gap: 16px; padding: 12px 0; border-bottom: 1px solid rgba(51, 65, 85, 0.3); align-items: center; }
    .prod-row:last-child { border-bottom: none; }
    .prod-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .prod-score { font-size: 12px; color: #94a3b8; }
    .score-badge { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

    .btn-nav { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-nav:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(124, 58, 237, 0.4); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">D</div>
  <div class="nav-item active" title="AllBoard">📊<div class="nav-label">AllBoard</div></div>
  <div class="nav-item" onclick="goToMonday()" title="Monday Meeting">📅<div class="nav-label">Monday Meeting</div></div>
</div>

<div class="main">
  <div class="header">
    <div class="header-title">AllBoard</div>
    <button class="btn-nav" onclick="goToMonday()">→ Monday Meeting</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Deals Annuels</div>
      <div class="stat-value">88</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CA Annuel</div>
      <div class="stat-value">1,08M €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Deals Mensuels</div>
      <div class="stat-value">3</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CA Mensuel</div>
      <div class="stat-value">28,6k €</div>
    </div>
  </div>

  <div class="content-grid">
    <div class="card-section">
      <div class="card-title">Classement Annuel</div>
      <div id="ranking-annuel"></div>
    </div>
    <div class="card-section">
      <div class="card-title">Classement Mensuel</div>
      <div id="ranking-mensuel"></div>
    </div>
  </div>

  <div class="card-section">
    <div class="card-title">Production (UL Score)</div>
    <table class="production-table">
      <tbody id="production-tbody"></tbody>
    </table>
  </div>
</div>

<script>
function goToMonday() {
  window.location.href = 'monday-meeting.html';
}

var classements_annuels = [
  ["ADEM", 134960, 10], ["HUGO", 113620, 8], ["CO", 109652, 9],
  ["AYANN", 98821, 9], ["BASILE", 87025, 6], ["KIM-SIAN", 62750, 5],
  ["BO", 59500, 3], ["MIKA", 59200, 5], ["BAPTISTE", 58630, 5], ["CAMILLE", 58010, 5],
];

var classements_mensuels = [
  ["BO", 0, 0], ["CHARLIE", 0, 0], ["KIM-SIAN", 0, 0],
  ["PIERRE C.", 0, 0], ["MARTIN", 0, 0], ["CO", 0, 0],
  ["MOLKA", 0, 0], ["AYANN", 0, 0], ["MIKA", 0, 0], ["MAXIME", 0, 0],
];

var ul_scores = [
  ["BASILE", 27.0, 27.0, 5], ["ADEM", 22.0, 22.0, 5], ["AYANN", 20.0, 20.0, 4],
  ["GAUTIER", 16.0, 16.0, 3], ["HUGO", 15.5, 15.5, 2], ["MIKA", 12.0, 13.0, 2],
  ["BAPTISTE", 11.0, 11.0, 2], ["PIERRE C.", 10.5, 10.5, 2], ["MARTIN", 10.5, 10.5, 2],
  ["KIM-SIAN", 10.0, 10.0, 2],
];

function renderRanking(data, elementId) {
  var html = '';
  data.forEach(function(item, i) {
    var badgeClass = i === 0 ? 'rank1' : i === 1 ? 'rank2' : i === 2 ? 'rank3' : 'other';
    html += '<div class="ranking-item">'
      + '<div class="rank-badge ' + badgeClass + '">' + (i+1) + '</div>'
      + '<div class="rank-info">'
      + '<div class="rank-name">' + item[0] + '</div>'
      + '<div class="rank-stat">' + (item[1] || 0).toLocaleString('fr-FR') + ' € • ' + (item[2] || 0) + ' deals</div>'
      + '</div>'
      + '<div class="rank-value">' + (item[1] || 0).toLocaleString('fr-FR') + ' €</div>'
      + '</div>';
  });
  document.getElementById(elementId).innerHTML = html;
}

function renderProduction() {
  var html = '';
  ul_scores.forEach(function(item) {
    html += '<tr class="prod-row">'
      + '<td class="prod-name">' + item[0] + '</td>'
      + '<td><span class="score-badge">' + item[1].toFixed(1) + '</span></td>'
      + '<td><span class="score-badge">' + item[2].toFixed(1) + '</span></td>'
      + '<td class="prod-score">1st ITW: ' + item[3] + '</td>'
      + '</tr>';
  });
  document.getElementById('production-tbody').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  renderRanking(classements_annuels, 'ranking-annuel');
  renderRanking(classements_mensuels, 'ranking-mensuel');
  renderProduction();
});
</script>

</body>
</html>
