<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Réunion du Lundi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      color: white;
    }
    .title {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .subtitle {
      font-size: 1.1em;
      margin-bottom: 48px;
      opacity: 0.9;
    }
    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 16px 40px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 250px;
      justify-content: center;
    }
    .btn-primary {
      background: white;
      color: #667eea;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid white;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .icon {
      font-size: 1.4em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">📊 Réunion du Lundi</h1>
    <p class="subtitle">Dashboard de suivi des consultants et de la pipeline</p>

    <div class="buttons">
      <a href="allboard.html" class="btn btn-primary">
        <span class="icon">📈</span>
        <span>AllBoard</span>
      </a>
      <a href="monday-meeting.html" class="btn btn-secondary">
        <span class="icon">👥</span>
        <span>Monday Meeting</span>
      </a>
    </div>
  </div>
</body>
</html>
