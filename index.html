.badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; display:inline-block; }
.badge-orange { background: #FEF3C7; color: #D97706; }
.badge-green  { background: #D1FAE5; color: #059669; }
.badge-red    { background: #FEE2E2; color: #DC2626; }
.pill { padding: 5px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.pill.active { background: #7C3AED; color: white; }
.pill:not(.active) { color: #6B7280; }
.pill:not(.active):hover { background: #F3F4F6; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: center; justify-content: center; }
.ttable th { font-size: 11px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; padding: 10px 12px; background: #F9FAFB; text-align: left; }
.ttable td { padding: 10px 12px; border-bottom: 1px solid #F3F4F6; font-size: 13px; color: #374151; }
.ttable tr:hover td { background: #FAFAFA; cursor: pointer; }
.oinput { border: 1px solid #E5E7EB; border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 100%; outline: none; }
.oinput:focus { border-color: #7C3AED; }
.chk { width: 16px; height: 16px; border: 2px solid #D1D5DB; border-radius: 4px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.chk.on { background: #7C3AED; border-color: #7C3AED; }
.avatar { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; flex-shrink: 0; }

function getMondayLabel() {
  var d=new Date(), day=d.getDay(), diff=d.getDate()-day+(day===0?-6:1);
  var m=new Date(d); m.setDate(diff);
  var s=m.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

    jobsHtml='<table id="jobs-tbl-'+uid+'" style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="color:#9CA3AF;font-size:10px;text-transform:uppercase"><th style="text-align:left;padding-bottom:8px;font-weight:700">Job / Client</th><th style="text-align:center;padding-bottom:8px;font-weight:700">Cand.</th><th style="text-align:center;padding-bottom:8px;font-weight:700">Sante</th></tr></thead>'
      +'<tbody id="jobs-body-'+uid+'">'+buildJobRows(cJobs,cItw,6)+'</tbody></table>';
    if(cJobs.length>6) jobsHtml+='<button id="jobs-more-'+uid+'" onclick="expandJobs(\''+uid+'\')" style="background:none;border:none;color:#7C3AED;font-size:12px;font-weight:500;cursor:pointer;padding:4px 0;margin-top:4px">+'+(cJobs.length-6)+' autres jobs</button>';
  }
  // Seed forecast entries from finalItw if first time
  var fcastEntries=getFcastEntries(uid, finalItw);
  // Save seeded entries so addFcastEntry/removeFcastEntry can read them later
  if(!localStorage.getItem("fcastentries_"+uid)) saveFcastEntries(uid, fcastEntries);
  var initPot=0, initPond=0;
  fcastEntries.forEach(function(e){ initPot+=e.ca; initPond+=Math.round((e.pct/100)*e.ca); });
  var forecastHtml='';
  fcastEntries.forEach(function(e,fi){
    forecastHtml+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#374151;background:#F0FDF4;border-radius:8px;padding:7px 10px;margin-bottom:4px">'
      +'<span style="flex:1;min-width:0;overflow:hidden">'
      +'<span contenteditable="true" style="font-weight:600;outline:none" onblur="updateFcastEntry(\''+uid+'\','+fi+',\'candidat\',this.textContent)">'+e.candidat+'</span>'
      +(e.company?' <span style="color:#9CA3AF;font-size:11px">@ <span contenteditable="true" style="outline:none" onblur="updateFcastEntry(\''+uid+'\','+fi+',\'company\',this.textContent)">'+e.company+'</span></span>':'')
      +'</span>'
      +'<input type="number" min="0" id="fcastca-'+uid+'-'+fi+'" value="'+(e.ca||'')+'" placeholder="CA"'
      +' oninput="updateFcastEntry(\''+uid+'\','+fi+',\'ca\',parseInt(this.value)||0);renderFcastSummary(\''+uid+'\')"'
      +' style="width:68px;border:1px solid #D1FAE5;border-radius:6px;padding:3px 5px;font-size:11px;text-align:center;background:white"> EUR'
      +'<input type="number" min="0" max="100" id="fcastpct-'+uid+'-'+fi+'" value="'+(e.pct||'')+'"'
      +' oninput="updateFcastEntry(\''+uid+'\','+fi+',\'pct\',parseInt(this.value)||0);renderFcastSummary(\''+uid+'\')"'
      +' style="width:40px;border:1px solid #D1FAE5;border-radius:6px;padding:3px 5px;font-size:11px;text-align:center;background:white">%'
      +'<button onclick="removeFcastEntry(\''+uid+'\','+fi+')" style="background:none;border:none;color:#FCA5A5;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;flex-shrink:0">&times;</button>'
      +'</div>';
  });
  if(fcastEntries.length===0) forecastHtml='<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:10px;font-size:12px;color:#B45309">Aucun potentiel</div>';
  pipeCard.innerHTML='<div style="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px">Pipeline & Portefeuille</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">'
    +'<div><div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px">Jobs actifs ('+cJobs.length+')</div>'+jobsHtml+'</div>'
    +'<div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;font-weight:600;color:#374151">Forecast potentiels</span><button onclick="addFcastEntry(\''+uid+'\')" style="background:#7C3AED;color:white;border:none;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">+ Ajouter</button><button onclick="resetFcastEntries(\''+uid+'\')" style="background:none;color:#9CA3AF;border:1px solid #E5E7EB;padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;margin-left:4px" title="Réinitialiser depuis le pipeline">↺</button></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'
    +'<div style="background:#F9FAFB;border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;color:#9CA3AF;margin-bottom:4px">CA Potentiel</div><div id="fcast-pot-'+uid+'" style="font-size:13px;font-weight:700;color:#2563EB">'+fmtEur(initPot)+'</div></div>'
    +'<div style="background:#F9FAFB;border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;color:#9CA3AF;margin-bottom:4px">CA Pondere</div><div id="fcast-pond-'+uid+'" style="font-size:13px;font-weight:700;color:#7C3AED">'+fmtEur(initPond)+'</div></div>'
    +'</div>'+forecastHtml+'</div></div>';
  d.appendChild(pipeCard);

  // ---- PLAN D'ACTION (DOM only, no inline onclick) ----
  var planCard = document.createElement("div");
  planCard.className="card";

  var planHeader = document.createElement("div");
  planHeader.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px";
  var planTitle = document.createElement("div");
  planTitle.style.cssText="font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.08em";
  planTitle.textContent="Plan d'action \u2014 Semaine prochaine";
  var planAddBtn = document.createElement("button");
  planAddBtn.style.cssText="display:flex;align-items:center;gap:4px;background:#7C3AED;color:white;border:none;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer";
  planAddBtn.textContent="+ Ajouter";
  planAddBtn.addEventListener("click", function(){ addPlanItem(uid); });
  planHeader.appendChild(planTitle);
  planHeader.appendChild(planAddBtn);
  planCard.appendChild(planHeader);

  var planGrid = document.createElement("div");
  planGrid.style.cssText="display:grid;grid-template-columns:1fr 1fr;gap:16px";
  var planItems=getPlanItems(uid,obj);
  var planHalf=Math.ceil(planItems.length/2);
  [0,1].forEach(function(col){
    var colDiv=document.createElement("div");
    var colStart=col===0?0:planHalf, colEnd=col===0?planHalf:planItems.length;
    for(var pi=colStart;pi<colEnd;pi++){
      (function(idx){
        var it=planItems[idx];
        var row=document.createElement("div");
        row.style.cssText="display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #F3F4F6";
        var chk=document.createElement("div");
        chk.className="chk"+(it.checked?" on":"");
        chk.style.marginTop="2px";
        chk.textContent=it.checked?"v":"";
        chk.addEventListener("click",function(){ togglePlanItem(uid,idx); });
        var lbl=document.createElement("span");
        lbl.contentEditable="true";
        lbl.style.cssText="font-size:13px;flex:1;min-width:0;outline:none;color:"+(it.checked?"#9CA3AF":"#374151")+";text-decoration:"+(it.checked?"line-through":"none");
        lbl.textContent=it.text;
        lbl.addEventListener("blur",function(){ updatePlanItem(uid,idx,lbl.textContent); });
        var del=document.createElement("button");
        del.style.cssText="background:none;border:none;color:#D1D5DB;cursor:pointer;font-size:15px;line-height:1;flex-shrink:0;padding:0 2px";
        del.innerHTML="&times;";
        del.addEventListener("click",function(){ removePlanItem(uid,idx); });
        row.appendChild(chk);
        row.appendChild(lbl);
        row.appendChild(del);
        colDiv.appendChild(row);
      })(pi);
    }
    planGrid.appendChild(colDiv);
  });
  planCard.appendChild(planGrid);
  d.appendChild(planCard);



  g("card").innerHTML="";
  g("card").appendChild(d);
}

  {id:"reunion",lbl:"Reunion",icon:"M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"},

];

function buildNav(){
  var html="";
  NAV.forEach(function(n){
    html+='<div class="nav-item'+(n.id==="reunion"?" active":"")+'" data-nav="'+n.id+'" title="'+n.lbl+'">'
      +'<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="'+n.icon+'"/></svg>'
      +'<span>'+n.lbl+'</span></div>';
  });
  g("nav-menu").innerHTML=html;
}
function navClick(id){
  document.querySelectorAll(".nav-item").forEach(function(el){el.classList.remove("active");});
  var el=document.querySelector('.nav-item[data-nav="'+id+'"]');
  if(el) el.classList.add("active");
  if(id==="equipe") showTeam();
}
// Attach nav clicks after build
function attachNav(){
  document.querySelectorAll(".nav-item[data-nav]").forEach(function(el){
    el.addEventListener("click",function(){ navClick(el.getAttribute("data-nav")); });
  });
}

// INIT
document.addEventListener("DOMContentLoaded", function(){
  try{
    buildNav();
    attachNav();
    g("top-date").textContent=getMondayLabel();
    g("data-status").textContent="Semaine 23 - Donnees integrees";
    buildPills();
    renderCard(0);
  } catch(err) {
    document.body.innerHTML="<pre style='color:red;padding:20px;font-size:14px'>"+err.name+": "+err.message+"\n\n"+err.stack+"</pre>";
    console.error(err);
  }
});

document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.isContentEditable) return;
  if(e.key==="ArrowRight") nextC();
  if(e.key==="ArrowLeft") prevC();
  if(e.key==="Escape"){closeTeam();closeObj();}
});
</script>
