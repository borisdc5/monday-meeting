<script>
// ===== SYNC TEMPS RÉEL (Firebase Firestore) =====
// Les saisies manuelles (objectifs, plan, potentiels, notes...) sont partagées
// entre tous les utilisateurs via Firestore. Le reste vient du Google Sheet.
var FB_CONFIG = {
  apiKey: "AIzaSyChp8rNf2aB2nEcKbNvu4gwczunAAN-i0w",
  authDomain: "monday-meeting-fb335.firebaseapp.com",
  projectId: "monday-meeting-fb335",
  storageBucket: "monday-meeting-fb335.firebasestorage.app",
  messagingSenderId: "681487302816",
  appId: "1:681487302816:web:8798079204440e35e0c9c5"
};
var _fbReady=false, _db=null, _col=null;
var _lsGet = localStorage.getItem.bind(localStorage);
var _lsSet = localStorage.setItem.bind(localStorage);
// Seules les vraies saisies utilisateur sont partagées (ulhist_/wstat_ = caches dérivés du sheet, non synchronisés)
function _isSyncKey(k){ return /^(obj_|plan_|planitems_|plannext_|planpast_|fcastentries_|note_|team_|pot_decisions)/.test(k); }
var _wq={};
function _queueWrite(k,v){
  if(_wq[k]) clearTimeout(_wq[k]);
  _wq[k]=setTimeout(function(){ delete _wq[k]; try{ _col.doc(k).set({v:String(v), t:Date.now()}); }catch(e){} }, 400);
}
try{
  firebase.initializeApp(FB_CONFIG);
  _db = firebase.firestore();
  _col = _db.collection("state");
  _fbReady = true;
  localStorage.setItem = function(k,v){
    _lsSet(k,v);
    if(_fbReady && _isSyncKey(k)) _queueWrite(k,v);
  };
}catch(e){ console.warn("Firebase init failed", e); }
function _syncInit(onReady){
  if(!_fbReady){ onReady&&onReady(); return; }
  var force = /[?&]push=1/.test(location.search);
  // En mode ?push=1 (récupération) : on pousse le LOCAL vers le cloud AVANT de
  // charger le cloud, pour que les données de ce navigateur fassent foi.
  var pre = Promise.resolve();
  if(force){
    var n=0;
    Object.keys(localStorage).forEach(function(k){
      if(!_isSyncKey(k)) return;
      var v=_lsGet(k); if(v!=null){ try{ _col.doc(k).set({v:String(v),t:Date.now()}); n++; }catch(e){} }
    });
    try{ alert("✅ "+n+" éléments de ce navigateur envoyés au cloud partagé."); }catch(e){}
    pre = new Promise(function(r){ setTimeout(r, 1500); });
  }
  // Mode restauration : ?restore=AAAA-MM-JJ remet l'état de la sauvegarde de ce jour
  if(/[?&]restore=/.test(location.search)){
    var rdate=(location.search.match(/restore=([0-9-]+)/)||[])[1]||"";
    _db.collection("backups").doc(rdate).get().then(function(b){
      if(!b.exists){ alert("❌ Aucune sauvegarde pour "+rdate); return; }
      var data=(b.data()||{}).data||{}, n=0;
      Object.keys(data).forEach(function(k){ try{ _col.doc(k).set({v:String(data[k]),t:Date.now()}); _lsSet(k,String(data[k])); n++; }catch(e){} });
      alert("✅ "+n+" éléments restaurés depuis la sauvegarde du "+rdate+". La page va se recharger.");
      setTimeout(function(){ location.href=location.pathname; }, 800);
    }).catch(function(e){ alert("Erreur restauration: "+e); });
    return; // on n'enchaîne pas le chargement normal en mode restauration
  }
  pre.then(function(){ return _col.get(); }).then(function(snap){
    var cloudKeys={}, backupMap={};
    snap.forEach(function(d){ cloudKeys[d.id]=1; var v=d.data().v; if(v!=null){ _lsSet(d.id, v); backupMap[d.id]=v; } });
    // Backfill normal : remonte les clés locales ABSENTES du cloud (1ère mise en commun)
    Object.keys(localStorage).forEach(function(k){
      if(!_isSyncKey(k)) return;
      if(!cloudKeys[k]){ var v=_lsGet(k); if(v!=null){ _queueWrite(k,v); backupMap[k]=v; } }
    });
    // Sauvegarde automatique quotidienne : le 1er qui ouvre l'outil dans la journée
    // fige un instantané complet de l'état partagé (point de restauration).
    var today=new Date().toISOString().slice(0,10);
    _db.collection("backups").doc(today).get().then(function(b){
      if(!b.exists){ _db.collection("backups").doc(today).set({ data: backupMap, ts: Date.now(), n: Object.keys(backupMap).length }); }
    }).catch(function(){});
  }).catch(function(e){ console.warn("sync load", e); }).then(function(){
    onReady && onReady();
    try{
      _col.onSnapshot(function(snap){
        var changed=false;
        snap.docChanges().forEach(function(ch){
          if(ch.type==="removed") return;
          var k=ch.doc.id, v=ch.doc.data().v;
          if(v!=null && _lsGet(k)!==v){ _lsSet(k,v); changed=true; }
        });
        if(changed){ try{ buildPills(); renderCard(gIdx); }catch(e){} }
      });
    }catch(e){}
  });
}

// Heatmap gradient: dark red -> red -> orange -> yellow-green -> fluo green
function gradColor(r) {
  r = Math.max(0, Math.min(1, r));
  var stops = [[127,29,29],[239,68,68],[245,158,11],[163,230,53],[57,255,20]];
  var seg = r * (stops.length - 1);
  var i = Math.min(Math.floor(seg), stops.length - 2);
  var t = seg - i, a = stops[i], b = stops[i+1];
  var ch = function(k){ return Math.round(a[k] + (b[k]-a[k])*t); };
  return "rgb(" + ch(0) + "," + ch(1) + "," + ch(2) + ")";
}

function getUlHist(uid){
  var stored=null;
  try{ var s=localStorage.getItem("ulhist_"+uid); if(s){ var o=JSON.parse(s); if(o&&o.scores&&o.scores.length) stored=o; } }catch(e){}
  var seed=UL_HISTORY_SEED[uid];
  if(seed){
    // Le seed est la verite historique. On part toujours du seed, et on ne
    // conserve du localStorage que les semaines qui depassent le seed (futur).
    var base={ start: UL_HISTORY_START_WEEK, scores: seed.slice() };
    if(stored){
      var seedLast=base.start + base.scores.length - 1;
      var storedLast=stored.start + stored.scores.length - 1;
      for(var wk=seedLast+1; wk<=storedLast; wk++){
        var idx=wk - stored.start;
        if(idx>=0 && idx<stored.scores.length) base.scores.push(stored.scores[idx]);
      }
    }
    return base;
  }
  return stored;
}
function saveUlHist(uid,o){ try{ localStorage.setItem("ulhist_"+uid,JSON.stringify(o)); }catch(e){} }
function ensureUlHistory(c){
  var o=getUlHist(c.uid), wk=c.sem||0;
  if(!o){ // aucun historique connu : on amorce a la semaine courante
    if(wk>0){ o={start:wk, scores:[c.ulScore]}; saveUlHist(c.uid,o); c.ulHistory=o.scores; c._ulStart=o.start; }
    else { c.ulHistory=[]; c._ulStart=null; }
    setUlDisplay(c); return;
  }
  if(wk>0){
    var lastWeek=o.start + o.scores.length - 1;
    if(wk>lastWeek){ while(lastWeek<wk){ o.scores.push(c.ulScore); lastWeek++; } saveUlHist(c.uid,o); }
    else if(wk===lastWeek){ o.scores[o.scores.length-1]=c.ulScore; saveUlHist(c.uid,o); }
  }
  c.ulHistory=o.scores; c._ulStart=o.start;
  setUlDisplay(c);
}
// Score "vitrine" = derniere semaine COMPLETEE. Le lundi, la semaine courante vient
// de demarrer (score 0, rien produit) : on affiche alors la semaine precedente,
// afin que la reunion review bien les chiffres de la semaine ecoulee.
function setUlDisplay(c){
  var hist=(c.ulHistory||[]).slice();
  var start=(c._ulStart!=null)?c._ulStart:((c.sem||1)-hist.length+1);
  var di=hist.length-1;
  if(di>0 && hist[di]===0) di--; // semaine en cours vide -> on recule d'une semaine
  if(di<0){ c.ulDisplay=c.ulScore; c.ulDisplayWeek=c.sem; c.ulHistDisplay=hist; return; }
  c.ulDisplay=hist[di];
  c.ulDisplayWeek=start+di;
  c.ulHistDisplay=hist.slice(0,di+1); // courbe jusqu'a la derniere semaine completee
}
// Accesseurs surs (avant que ensureUlHistory ait tourne, on retombe sur le score brut)
function udisp(c){ return (c.ulDisplay!=null)?c.ulDisplay:c.ulScore; }
function udweek(c){ return (c.ulDisplayWeek!=null)?c.ulDisplayWeek:c.sem; }

function normName(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase().replace(/\s+/g," "); }
function ensureFinalItwSeeded(uid, finalItw) {

function isoWeekId(d){
  d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var day=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()+4-day);
  var yStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  var wk=Math.ceil((((d-yStart)/86400000)+1)/7);
  return d.getUTCFullYear()*100+wk; // ex: 202623, comparable numeriquement
}

  return {week:curWeekId(),items:defaultPlanItems(obj)};

// A appeler une fois au rendu : fait remonter le plan en "semaine passee" si la semaine a change
function ensureWeekRollover(uid,obj){
  var w=curWeekId();
  var nxt=rawPlanNext(uid,obj);
  if(nxt.week==null){ nxt.week=w; savePlanNext(uid,nxt); return; }
  if(nxt.week<w){
    savePlanPast(uid,{week:nxt.week,items:nxt.items}); // l'ancien plan devient "semaine passee"
    nxt={week:w,items:[]};                              // le bas repart a vide pour la nouvelle semaine
    savePlanNext(uid,nxt);
  } else {
    savePlanNext(uid,nxt); // persiste la migration eventuelle
  }
}

function openObj(uid) {

}

// Matrice AllBoard : metriques d'activite par semaine et par consultant (source fiable)
var MATRIX = {};        // uid -> {week, presc, cvsent, firstItw, otherItw, ulscore}
// Numero de semaine ISO de la date donnee (1..53).
function _isoWeek(d){ d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
  var ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-ys)/86400000)+1)/7); }
// La reunion du lundi passe en revue la semaine PRECEDENTE : on ne montre jamais
// la semaine en cours. On choisit donc la derniere semaine disponible qui est
// strictement anterieure a la semaine ISO du jour.
function _targetWeek(weeks){
  var cur=_isoWeek(new Date());
  var best=0;
  for(var i=0;i<weeks.length;i++){ var w=weeks[i]; if(w<cur && w>best) best=w; }
  if(best) return best;            // cas normal
  // repli (debut d'annee / donnees decalees) : la plus recente disponible
  for(var j=0;j<weeks.length;j++){ if(weeks[j]>best) best=weeks[j]; }
  return best;
}
var MATRIX_WEEK = null; // semaine precedente (revue en reunion)
function buildAllboard(rows){
  if(!rows || rows.length<5) return;
  var wkrow=rows[3], midrow=rows[4];
  var metrics=["PRESC","CVSENT","1STITW","OTHITW","PRISEREF","PROSPVIS","PROSPPHY","ACCMANA","TNCS","ULSCORE","JOBTOT","JOBHOT"];
  var colmap={};
  for(var j=0;j<midrow.length;j++){
    var m=(midrow[j]||"").trim(), w=(wkrow[j]||"").trim();
    if(metrics.indexOf(m)>=0 && /^\d+$/.test(w)) colmap[w+"|"+m]=j;
  }
  var cons=[];
  for(var i=0;i<rows.length;i++){ var uid=(rows[i][1]||"").trim(); if(/^\d+$/.test(uid)) cons.push(rows[i]); }
  function num(s){ s=(s==null?"":String(s)).trim().replace(",","."); var n=parseFloat(s); return isNaN(n)?0:n; }
  function val(row,w,m){ var c=colmap[w+"|"+m]; return c!=null?num(row[c]):0; }
  var weeks=[]; for(var k in colmap){ var w=parseInt(k.split("|")[0],10); if(weeks.indexOf(w)<0) weeks.push(w); }
  weeks.sort(function(a,b){return a-b;});
  var last=_targetWeek(weeks); // semaine precedente, jamais la semaine en cours
  if(!last) return;
  // Construit dans un objet TEMP, puis ne remplace que si le résultat est complet.
  // Évite qu'un CSV transitoire/partiel ne vide les stats (flicker à zéro).
  var tmp={};
  for(var c2=0;c2<cons.length;c2++){ var r=cons[c2], u=(r[1]||"").trim();
    tmp[u]={ week:last, presc:val(r,last,"PRESC"), cvsent:val(r,last,"CVSENT"), firstItw:val(r,last,"1STITW"), otherItw:val(r,last,"OTHITW"), ulscore:val(r,last,"ULSCORE"),
      meetings: val(r,last,"PROSPVIS")+val(r,last,"PROSPPHY")+val(r,last,"ACCMANA") };
  }
  // Garde-fou : on n'écrase l'ancien MATRIX que si le parse a trouvé assez de consultants.
  var prevCount = Object.keys(MATRIX).length;
  if(Object.keys(tmp).length < Math.max(5, prevCount - 3)) return; // parse douteux -> on garde l'ancien
  MATRIX_WEEK=last;
  MATRIX = tmp;
}

// Calls Prospect par semaine (feuille detaillee gid=91361805).
// Colonnes: 0 Created On, 2 User (nom), 4 Call Type, 7 Week. User ID vide -> match par nom.
// On compte UNIQUEMENT "5 - Prospect Call" (les vrais), on EXCLUT "4 - Prospect Call NA".
var CALLS = {};        // nomNormalise -> nb de prospect calls (derniere semaine)
var CALLS_WEEK = null;
function buildCalls(rows){
  if(!rows || rows.length<2) return;
  // detecte la derniere semaine presente
  var wset={};
  for(var i=1;i<rows.length;i++){ var w=(rows[i][7]||"").trim(); if(/^\d+$/.test(w)) wset[w]=true; }
  var weeks=[]; for(var k in wset) weeks.push(parseInt(k,10));
  var last=_targetWeek(weeks); // meme semaine precedente que les stats
  if(!last) return;
  CALLS_WEEK=last; CALLS={};
  for(var r=1;r<rows.length;r++){
    var w=(rows[r][7]||"").trim(); if(parseInt(w,10)!==last) continue;
    var type=(rows[r][4]||"").trim();
    if(type.indexOf("5 - Prospect Call")!==0) continue; // exclut "4 - Prospect Call NA"
    var nm=normName(rows[r][2]); if(!nm) continue;
    CALLS[nm]=(CALLS[nm]||0)+1;
  }
}
function callsFor(c){ var v=CALLS[normName(c.name)]; return (v!=null)?v:(c.dispCalls!=null?c.dispCalls:(c.callAb||0)); }
var MM_REFRESH_MS = 5 * 60 * 1000;

function parseCSV(text) {
  var rows = [], row = [], field = '', inQuotes = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (inQuotes) {
      if (ch === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (ch === '\r') { /* ignore */ }
      else field += ch;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}
function cv(row, i) { return (row && row[i] != null) ? String(row[i]).trim() : ''; }
function toInt(s) { var n = parseInt((s || '').replace(/[^0-9-]/g, ''), 10); return isNaN(n) ? 0 : n; }
function toScore(s) { var n = parseFloat((s || '').replace(/[^0-9,.-]/g, '').replace(',', '.')); return isNaN(n) ? 0 : n; }

function findHeader(rows, col0) {
  for (var r = 0; r < rows.length; r++) if (cv(rows[r], 0) === col0) return r;
  return -1;
}

function mergeSummary(rows) {
  var hdr = findHeader(rows, 'Consultant');
  if (hdr === -1) return;
  for (var r = hdr + 1; r < rows.length; r++) {
    var uid = cv(rows[r], 1), name = cv(rows[r], 0);
    if (!uid || !name) continue;
    if (uid === "48693") continue; // Boris DC exclu
    var c = DATA_SUMMARY.find(function(x){ return x.uid === uid; });
    if (!c) { c = { name: name, uid: uid, ulHistory: [], team: "" }; DATA_SUMMARY.push(c); }
    c.name      = name;
    c.nbJob     = toInt(cv(rows[r], 2));
    c.nbProcess = toInt(cv(rows[r], 5));
    c.ulScore   = toScore(cv(rows[r], 6));
    c.firstItw  = toInt(cv(rows[r], 7));
    c.meeting   = toInt(cv(rows[r], 8));
    c.callNA    = toInt(cv(rows[r], 9));
    c.callAb    = toInt(cv(rows[r], 10));
    c.deals     = toInt(cv(rows[r], 11));
    c.ca        = toInt(cv(rows[r], 12));
    c.sem       = toInt(cv(rows[r], 13));
    // garde l'historique en base; cale le dernier point sur le score courant
    if (c.ulHistory && c.ulHistory.length) c.ulHistory[c.ulHistory.length - 1] = c.ulScore;
    else c.ulHistory = [c.ulScore];
  }
}
function buildItw(rows) {
  var hdr = findHeader(rows, 'User ID'); if (hdr === -1) hdr = 0;
  var out = [];
  for (var r = hdr + 1; r < rows.length; r++) {
    var uid = cv(rows[r], 0); if (!uid) continue;
    out.push({ uid: uid, slug: cv(rows[r], 4), job: cv(rows[r], 5), client: cv(rows[r], 3), candidat: cv(rows[r], 6), stage: cv(rows[r], 7), date: cv(rows[r], 8), week: toInt(cv(rows[r], 9)) });
  }
  return out;
}
function buildJobs(rows) {
  var hdr = findHeader(rows, 'User ID'); if (hdr === -1) hdr = 0;
  var out = [];
  for (var r = hdr + 1; r < rows.length; r++) {
    var uid = cv(rows[r], 0); if (!uid) continue;
    out.push({ uid: uid, job: cv(rows[r], 5), client: cv(rows[r], 3), slug: cv(rows[r], 4) });
  }
  return out;
}

// Un CSV n'est appliqué QUE s'il est valide (pas vide, pas une page HTML d'erreur,
// et contient le mot-clé d'en-tête attendu). Sinon on garde les dernières bonnes données.
function _csvOk(text, mustHave){
  if(!text || text.length < 40) return false;
  if(/^\s*</.test(text)) return false;            // page HTML (erreur Google transitoire)
  if(mustHave && text.indexOf(mustHave) === -1) return false;
  return true;
}
function loadMondayData() {
  function grab(u){ return fetch(u, { cache: 'no-store' }).then(function(r){ return r.ok ? r.text() : ""; }).catch(function(){ return ""; }); }
  Promise.all([ grab(MM_URLS.summary), grab(MM_URLS.itw), grab(MM_URLS.jobs), grab(MM_URLS.matrix), grab(MM_URLS.calls) ])
  .then(function(texts){
    var applied=0;
    if(_csvOk(texts[0],'Consultant')){ mergeSummary(parseCSV(texts[0])); applied++; }
    if(_csvOk(texts[1],'User ID'))   { DATA_ITW  = buildItw(parseCSV(texts[1])); applied++; }
    if(_csvOk(texts[2],'User ID'))   { DATA_JOBS = buildJobs(parseCSV(texts[2])); applied++; }
    if(_csvOk(texts[3],'PRESC'))     { buildAllboard(parseCSV(texts[3])); applied++; }
    if(_csvOk(texts[4],'Call Type')) { buildCalls(parseCSV(texts[4])); applied++; }
    DATA_SUMMARY.forEach(function(c){ ensureUlHistory(c); ensureWStat(c); });
    buildPills();
    renderCard(gIdx);
    if(applied>0){
      g("data-status").textContent = "Mis à jour à " + new Date().toLocaleTimeString();
    } else {
      g("data-status").textContent = "Données en cache (source momentanément indisponible)";
    }
  }).catch(function(err){
    console.error("Echec chargement Monday Meeting:", err);
    g("data-status").textContent = "Hors ligne — données en cache";
  });
}

// === Reset ponctuel des objectifs "semaine prochaine" (le haut "semaine passee" est conserve) ===
// Pour redeclencher un reset plus tard, changer la valeur du jeton ci-dessous.
var PLAN_NEXT_RESET_TOKEN = "2026-06-08";
function meetingMondayWeekId(){
  var d=new Date(), day=d.getDay();
  var add=(day===1)?0:((8-day)%7);
  var m=new Date(d); m.setDate(d.getDate()+add);
  return isoWeekId(m); // semaine du lundi de reunion -> evite tout rollover destructeur
}
function resetAllPlanNextOnce(){
  try{
    if(localStorage.getItem("plannext_reset")===PLAN_NEXT_RESET_TOKEN) return;
    var wk=meetingMondayWeekId(), empty=JSON.stringify({week:wk,items:[]});
    // vide pour tous les consultants connus
    DATA_SUMMARY.forEach(function(c){ localStorage.setItem("plannext_"+c.uid, empty); });
    // vide aussi toute cle plannext_ residuelle (anciens uid, etc.)
    Object.keys(localStorage).forEach(function(k){ if(k.indexOf("plannext_")===0) localStorage.setItem(k, empty); });
    localStorage.setItem("plannext_reset", PLAN_NEXT_RESET_TOKEN);
  }catch(e){}
}
